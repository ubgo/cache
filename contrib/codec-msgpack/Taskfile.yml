version: "3"

# Reusable command runner for the ubgo/cache contrib module codec-msgpack.
# Run `task --list` to see all available tasks.

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  test:
    desc: Run tests
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with the race detector
    cmds:
      - go test -race -count=2 ./...

  vet:
    desc: go vet
    cmds:
      - go vet ./...

  lint:
    desc: golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:check:
    desc: Fail if any file is not gofmt-clean
    cmds:
      - test -z "$(gofmt -l .)"

  tidy:
    desc: Tidy go.mod
    cmds:
      - go mod tidy

  check:
    desc: Full local gate (fmt + vet + race tests + lint)
    cmds:
      - task: fmt:check
      - task: vet
      - task: test:race
      - task: lint
